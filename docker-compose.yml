version: '3.8'

services:
  app:
    build: .
    container_name: syomohin-app
    restart: unless-stopped
    ports:
      - "8504:8504"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./static:/app/static
    networks:
      - syomohin-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  syomohin-network:
    driver: bridge
