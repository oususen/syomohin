version: '3.8'

services:
  app:
    build: .
    container_name: syomohin_app_prod
    restart: always
    ports:
      - "8504:8504"
    environment:
      - INVENTORY_DB_HOST=${PRIMARY_DB_HOST:-mysql}
      - INVENTORY_DB_PORT=${PRIMARY_DB_PORT:-3306}
      - INVENTORY_DB_USER=${PRIMARY_DB_USER:-root}
      - PRIMARY_DB_PASSWORD=${PRIMARY_DB_PASSWORD}
      - INVENTORY_DB_NAME=${INVENTORY_DB_NAME:-inventory_db}
      - FLASK_ENV=production
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./static:/app/static
      - ./templates:/app/templates
      - ./.env:/app/.env:ro
      - ./certs:/app/certs:ro
      - ./docs:/app/docs:ro
    networks:
      - ts_pm_network_v2
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ts_pm_network_v2:
    external: true
